<!DOCTYPE html>
<html>
<head>
    <title>Teams Sound Detector</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { font-family: Arial; text-align: center; margin-top: 40px; }
        button { font-size: 20px; padding: 10px 20px; }
        #status { margin-top: 20px; font-size: 18px; color: green; }
    </style>
</head>
<body>

<h2>Teams Notification Listener</h2>
<button onclick="startListening()">Start Listening</button>
<p id="status">Waiting...</p>

<label>Sensitivity:</label>
<input type="range" min="1000" max="8000" value="3000" id="sens">
<p>Value: <span id="val">3000</span></p>

<audio id="alarm" src="alarm.mp3"></audio>

<script>
let referenceSpectrum = [];
let audioContext;
let canTrigger = true;

document.getElementById("sens").oninput = function() {
    document.getElementById("val").innerText = this.value;
}

async function loadReferenceSound() {
    audioContext = new (window.AudioContext || window.webkitAudioContext)();
    const response = await fetch("teams_sound.mp3");
    const arrayBuffer = await response.arrayBuffer();
    const audioBuffer = await audioContext.decodeAudioData(arrayBuffer);

    const offlineContext = new OfflineAudioContext(1, audioBuffer.length, audioBuffer.sampleRate);
    const source = offlineContext.createBufferSource();
    source.buffer = audioBuffer;

    const analyser = offlineContext.createAnalyser();
    analyser.fftSize = 2048;

    source.connect(analyser);
    analyser.connect(offlineContext.destination);
    source.start(0);

    await offlineContext.startRendering();

    let data = new Uint8Array(analyser.frequencyBinCount);
    analyser.getByteFrequencyData(data);
    referenceSpectrum = Array.from(data);
}

async function startListening() {
    document.getElementById("status").innerText = "Starting in 5 seconds...";
    await loadReferenceSound();

    setTimeout(async () => {
        document.getElementById("status").innerText = "Listening...";

        const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
        const mic = audioContext.createMediaStreamSource(stream);
        const analyser = audioContext.createAnalyser();
        analyser.fftSize = 2048;
        mic.connect(analyser);

        let liveData = new Uint8Array(analyser.frequencyBinCount);

        function detect() {
            analyser.getByteFrequencyData(liveData);

            let diff = 0;
            let volume = 0;

            for (let i = 0; i < liveData.length; i++) {
                diff += Math.abs(liveData[i] - referenceSpectrum[i]);
                volume += liveData[i];
            }

            diff = diff / liveData.length;
            volume = volume / liveData.length;

            let sensitivity = document.getElementById("sens").value;

            if (diff < sensitivity && volume > 25 && canTrigger) {
                canTrigger = false;
                document.getElementById("status").innerText = "Teams Notification Detected!";

                let alarm = document.getElementById("alarm");
                alarm.pause();
                alarm.currentTime = 0;
                alarm.play();

                setTimeout(() => {
                    canTrigger = true;
                    document.getElementById("status").innerText = "Listening...";
                }, 15000);
            }

            requestAnimationFrame(detect);
        }

        detect();

    }, 5000);
}
</script>

</body>
</html>
