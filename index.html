<!DOCTYPE html>
<html>
<head>
    <title>Teams Sound Detector</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body {
            font-family: Arial;
            text-align: center;
            margin-top: 50px;
        }
        button {
            font-size: 20px;
            padding: 10px 20px;
        }
        #status {
            margin-top: 20px;
            font-size: 18px;
            color: green;
        }
    </style>
</head>
<body>

<h2>Teams Notification Sound Detector</h2>
<button onclick="startListening()">Start Listening</button>
<p id="status">Waiting...</p>

<audio id="alarm" src="alarm.mp3"></audio>

<script>
let referenceSpectrum = [];
let audioContext;

async function loadReferenceSound() {
    audioContext = new (window.AudioContext || window.webkitAudioContext)();
    const response = await fetch("teams_sound.mp3");
    const arrayBuffer = await response.arrayBuffer();
    const audioBuffer = await audioContext.decodeAudioData(arrayBuffer);

    const analyser = audioContext.createAnalyser();
    const source = audioContext.createBufferSource();
    source.buffer = audioBuffer;
    source.connect(analyser);
    analyser.connect(audioContext.destination);
    source.start(0);

    let data = new Uint8Array(analyser.frequencyBinCount);
    analyser.getByteFrequencyData(data);
    referenceSpectrum = Array.from(data);
}

async function startListening() {
    document.getElementById("status").innerText = "Listening for Teams sound...";
    await loadReferenceSound();

    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
    const mic = audioContext.createMediaStreamSource(stream);
    const analyser = audioContext.createAnalyser();
    mic.connect(analyser);

    let liveData = new Uint8Array(analyser.frequencyBinCount);

    function detect() {
        analyser.getByteFrequencyData(liveData);

        let diff = 0;
        for (let i = 0; i < liveData.length; i++) {
            diff += Math.abs(liveData[i] - referenceSpectrum[i]);
        }

        if (diff < 5000) {
            document.getElementById("status").innerText = "Teams Notification Detected!";
            document.getElementById("alarm").play();
        }

        requestAnimationFrame(detect);
    }

    detect();
}
</script>

</body>
</html>
